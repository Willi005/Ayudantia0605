name: Build and Push Docker Image to GHCR

on:
  push:
    branches:
      - feature/post-task

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'corretto'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      # Login en GitHub Container Registry
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Construir y subir imagen a GHCR
      - name: Build and push Docker image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/mi-api:latest

      - name: Image pushed successfully
        run: echo "Image pushed to ghcr.io/${{ github.repository_owner }}/mi-api:latest"